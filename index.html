<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>

    --gold:#d4af37; --gold-soft:#f0d78a; --gold-dim:#8a7126;
    --white:#f6f5f1; --muted:#9a9aa2;
    --emerald:#22c58b; --crimson:#e14b4b;
    --glass: rgba(255,255,255,.04);

  *{box-sizing:border-box;}
  body{margin:0;background:
      radial-gradient(220px 900px at 12% -6%, rgba(255,255,255,.06), transparent 55%),
      radial-gradient(220px 900px at 88% -6%, rgba(255,255,255,.05), transparent 55%),
      radial-gradient(1200px 600px at 15% -10%, rgba(212,175,55,.13), transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, rgba(34,197,139,.07), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(212,175,55,.06), transparent 60%),
      radial-gradient(1400px 900px at 50% 50%, rgba(20,30,55,.35), transparent 70%),
      repeating-linear-gradient(115deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 60px),
      repeating-radial-gradient(circle at 50% 100%, rgba(255,255,255,.02) 0px, transparent 2px, transparent 140px),
      linear-gradient(180deg, #0a0d12 0%, #0b0b0d 40%, var(--black) 100%);
    background-attachment:fixed;
    color:var(--white); font-family:'Inter',sans-serif; min-height:100vh; position:relative;
  }
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:
      linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.35) 100%),
      radial-gradient(ellipse 900px 300px at 50% 100%, rgba(34,197,139,.05), transparent 70%);}
  #app{position:relative; z-index:1;}
  .stadium-particles{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .particle{position:absolute; top:100%; border-radius:50%; background:var(--gold-soft);
    animation-name:particleRise; animation-timing-function:linear; animation-iteration-count:infinite;}
  @keyframes particleRise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:.6; }
    100%{ transform:translateY(-105vh) translateX(20px); opacity:0; }
  }
  .disp{font-family:'Anton',sans-serif; letter-spacing:.03em; text-transform:uppercase; text-shadow:0 2px 14px rgba(212,175,55,.18);}
  .mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;} ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:8px;}
  .glass{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.015));
    border:1px solid var(--line); border-radius:18px; backdrop-filter: blur(14px);
    box-shadow:0 14px 44px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    position:relative; overflow:hidden;}
  .glass::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:18px;
    background:linear-gradient(120deg, rgba(212,175,55,.06), transparent 30%, transparent 70%, rgba(212,175,55,.04));}
  .btn{cursor:pointer; border:1px solid var(--line); border-radius:12px; padding:10px 18px; font-weight:700;
    background:linear-gradient(180deg, #222226, var(--panel)); color:var(--white); transition:.18s ease; font-family:'Inter',sans-serif;
    box-shadow:0 2px 8px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);}
  .btn:hover{transform:translateY(-2px); border-color:var(--gold); box-shadow:0 10px 26px rgba(212,175,55,.2), inset 0 1px 0 rgba(255,255,255,.08);}
  .btn:active{transform:translateY(0);}
  .btn-gold{background:linear-gradient(135deg,var(--gold-soft),var(--gold) 45%,#a9822a); color:#141400; border:none; box-shadow:0 4px 20px rgba(212,175,55,.3);}
  .btn-gold:hover{box-shadow:0 12px 32px rgba(212,175,55,.45);}
  .btn-ghost{background:transparent; box-shadow:none;}
  .btn-danger{background:linear-gradient(135deg,var(--crimson),#8f2b2b); color:white; border:none;}
  .btn-green{background:linear-gradient(135deg,var(--emerald),#177052); color:#04140d; border:none;}
  .btn:disabled{opacity:.35; cursor:not-allowed; transform:none;box-shadow:none;}
  input,select{background:#101012; border:1px solid var(--line); border-radius:10px; color:var(--white);
    padding:10px 12px; font-family:'Inter',sans-serif; outline:none; width:100%; transition:.15s ease;}
  input:focus,select:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,.14);}
  .container{max-width:1180px; margin:0 auto; padding:22px 18px 60px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 22px;
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:40;
    background:rgba(11,11,13,.85); backdrop-filter:blur(12px);}
  .brand{display:flex; align-items:center; gap:10px; font-size:20px;}
  .brand .mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#7a5f1c);
    display:flex;align-items:center;justify-content:center;font-size:16px;color:#161200;}
  .pill{padding:5px 12px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted);}
  .tabs{display:flex; gap:6px; flex-wrap:wrap; margin:18px 0;}
  .tab{padding:9px 16px;border-radius:11px;border:1px solid var(--line);cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);
    transition:.18s ease; background:rgba(255,255,255,.02);}
  .tab:hover{color:var(--white); border-color:rgba(212,175,55,.4);}
  .tab.active{background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.05)); color:var(--gold-soft); border-color:var(--gold);
    box-shadow:0 4px 16px rgba(212,175,55,.18);}
  .grid{display:grid; gap:14px;}
  .fade-in{animation:fadeIn .45s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(.85);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(225,75,75,.55);} 70%{box-shadow:0 0 0 8px rgba(225,75,75,0);} 100%{box-shadow:0 0 0 0 rgba(225,75,75,0);}}
  .live-dot{width:9px;height:9px;border-radius:50%;background:var(--crimson);display:inline-block;animation:pulse 1.6s infinite;margin-right:6px;}
  .float{animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}
  .avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Anton',sans-serif; font-size:20px; border:2px solid var(--gold); flex-shrink:0;
    box-shadow:0 0 0 4px rgba(212,175,55,.08), 0 0 30px rgba(212,175,55,.35);}
  .badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;}
  .b-gk{background:rgba(212,175,55,.18);color:var(--gold-soft);}
  .b-def{background:rgba(90,140,255,.18);color:#8fb2ff;}
  .b-mid{background:rgba(34,197,139,.18);color:#7fe6c1;}
  .b-fwd{background:rgba(225,75,75,.18);color:#ff9d9d;}
  .timer-ring{position:relative; width:120px;height:120px;}
  .bidrow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.06);}
  .scrolly{max-height:260px; overflow-y:auto;}
  .toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:14px 20px;border-radius:14px;
    background:linear-gradient(135deg,#1a1a1e,#101012); border:1px solid var(--gold); box-shadow:0 12px 32px rgba(0,0,0,.5);
    animation:slideIn .35s ease both; font-weight:600; max-width:320px;}
  @keyframes slideIn{from{transform:translateX(120%)} to{transform:translateX(0)}}
  .confetti-piece{position:fixed; top:-10px; width:8px;height:14px; z-index:300; border-radius:2px;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg); opacity:0;}}
  .pitch{background:
    repeating-linear-gradient(0deg, #0e3d24, #0e3d24 40px, #114a2c 40px, #114a2c 80px);
    border-radius:16px; border:2px solid rgba(255,255,255,.15); position:relative; min-height:460px;}
  .pitch-line{position:absolute; border:2px solid rgba(255,255,255,.28); border-radius:50%;}
  .player-chip{width:78px;text-align:center;position:absolute;transform:translate(-50%,-50%);}
  .player-chip .dot{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#7a5f1c);

    box-shadow:0 0 14px rgba(212,175,55,.4); transition:.15s ease;}
  .player-chip .dot:hover{transform:scale(1.08); box-shadow:0 0 20px rgba(212,175,55,.6);}
  .slot-label{font-size:9px;color:var(--gold-soft);font-weight:800;letter-spacing:.04em;text-shadow:0 1px 3px black;}
  .slot-name{font-size:10px;margin-top:2px;color:white;text-shadow:0 1px 3px black;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .slot-select{width:92px;font-size:10px;padding:4px 3px;background:#101012;border:1px solid var(--gold);border-radius:6px;color:var(--white);}
  .bench-chip{display:flex;align-items:center;padding:6px 12px;border-radius:999px;background:var(--glass);
    border:1px solid var(--line);font-size:12px;font-weight:600;}
  .login-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .login-bg::before{content:'';position:absolute;inset:0;
    background:
      radial-gradient(420px 300px at 82% 22%, rgba(80,190,140,.16), transparent 65%),
      radial-gradient(600px 420px at 8% 88%, rgba(90,55,30,.35), transparent 60%),
      radial-gradient(600px 420px at 95% 92%, rgba(90,55,30,.32), transparent 60%),
      radial-gradient(700px 500px at 50% 8%, rgba(120,80,35,.14), transparent 65%);
    filter:blur(2px);}
  .login-tv{position:absolute;top:10%;right:6%;width:34%;max-width:340px;aspect-ratio:16/10;border-radius:10px;
    background:linear-gradient(160deg, rgba(60,140,90,.55), rgba(20,60,40,.6));
    box-shadow:0 0 90px 20px rgba(90,200,140,.18), inset 0 0 40px rgba(0,0,0,.4);
    filter:blur(6px); opacity:.7;}
  .login-chip{position:absolute;border-radius:50%;font-family:'Anton',sans-serif;color:rgba(212,175,55,.28);
    background:linear-gradient(135deg,rgba(212,175,55,.10),rgba(212,175,55,.02));
    border:2px solid rgba(212,175,55,.18);display:flex;align-items:center;justify-content:center;
    animation-name:float; animation-iteration-count:infinite; animation-timing-function:ease-in-out;}
  .on-block-ribbon{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.08em;color:#161200;
    background:linear-gradient(135deg,var(--gold-soft),var(--gold));padding:4px 12px;border-radius:999px;
    margin-bottom:14px; box-shadow:0 4px 14px rgba(212,175,55,.3);}
  .spotlight-glow{position:absolute; inset:-24px; border-radius:50%;
    background:radial-gradient(circle, rgba(212,175,55,.35) 0%, rgba(212,175,55,.12) 45%, transparent 72%);
    animation:spotlightPulse 2.4s ease-in-out infinite; z-index:0;}
  @keyframes spotlightPulse{0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:.95; transform:scale(1.08);}}
  .fut-card{position:relative; width:150px; flex-shrink:0; padding:16px 12px; border-radius:18px; text-align:center;
    background:linear-gradient(160deg, #201a0d, #0e0e10 55%, #14110a); border:2px solid var(--gold);
    box-shadow:0 12px 34px rgba(0,0,0,.55), 0 0 26px rgba(212,175,55,.25), inset 0 1px 0 rgba(255,255,255,.08);
    transition:transform .12s ease-out; transform-style:preserve-3d; overflow:hidden; cursor:pointer;}
  .fut-card-sheen{position:absolute; inset:0; border-radius:18px; pointer-events:none;
    background:linear-gradient(115deg, transparent 25%, rgba(255,255,255,.16) 40%, rgba(255,255,255,.02) 55%, transparent 70%);
    background-size:220% 220%; animation:sheenMove 4s ease-in-out infinite;}
  @keyframes sheenMove{0%{background-position:220% 0;} 100%{background-position:-60% 100%;}}
  .fut-rating{font-family:'Anton',sans-serif; font-size:34px; color:var(--gold-soft); line-height:1; margin-top:2px;}
  .fut-pos{font-size:12px; font-weight:800; letter-spacing:.06em; color:var(--white); margin-top:2px;}
  .fut-portrait{position:relative; margin:10px auto 6px;}
  .fut-flagclub{display:flex; align-items:center; justify-content:center; gap:6px; font-size:12px; color:var(--muted); margin-top:4px;}
  .fut-club-badge{padding:2px 7px; border-radius:6px; background:rgba(255,255,255,.08); font-size:10px; font-weight:700; letter-spacing:.04em;}
  .fut-rarity{margin-top:10px; padding:4px 10px; border-radius:999px; font-size:10px; font-weight:800; letter-spacing:.08em; display:inline-block;}
  .rarity-icon{background:linear-gradient(135deg,var(--gold-soft),var(--gold)); color:#161200;}
  .rarity-prime{background:linear-gradient(135deg,#3a8bd8,#1c4f80); color:white;}
  .rarity-current{background:linear-gradient(135deg,var(--emerald),#177052); color:#04140d;}
  .rarity-ucl{background:linear-gradient(135deg,#1b2a6b,#0d1638); color:#cfe0ff; border:1px solid rgba(212,175,55,.5);}
  .rarity-wonderkid{background:linear-gradient(135deg,#2bb3a3,#166a61); color:#04140d;}
  .rarity-national{background:linear-gradient(135deg,var(--crimson),#8f2b2b); color:white;}
  .attr-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px 16px; margin-top:14px;}
  .attr-label{font-size:10.5px; color:var(--muted); font-weight:700; display:flex; justify-content:space-between; margin-bottom:3px; letter-spacing:.03em;}
  .attr-val{color:var(--gold-soft);}
  .pulse-red-timer{animation:pulseRedTimer 1s ease-in-out infinite;}
  @keyframes pulseRedTimer{0%,100%{transform:scale(1);} 50%{transform:scale(1.08);}}
  .mini-avatar{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
    background:linear-gradient(135deg,var(--gold),#7a5f1c);color:#161200;font-size:9px;font-weight:800;flex-shrink:0;}
  .spinning-ball{display:inline-block; animation:spinBall 5s linear infinite, float 4s ease-in-out infinite; filter:drop-shadow(0 6px 14px rgba(212,175,55,.35));}
  .login-shimmer{position:relative;}
  .login-shimmer::after{content:'';position:absolute;inset:-1px;border-radius:18px;padding:1px;pointer-events:none;
    background:linear-gradient(120deg, transparent, rgba(212,175,55,.9), transparent 40%);
    background-size:250% 250%; animation:borderShimmer 3.2s linear infinite;
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;}
  @keyframes borderShimmer{0%{background-position:0% 0%;} 100%{background-position:100% 100%;}}

  .input-icon-wrap{position:relative;}
  .input-icon{position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px; opacity:.7; pointer-events:none;}
  @keyframes spinBall{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
  .tactical-board{position:relative; overflow:hidden;}
  .tactical-board::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:
      repeating-linear-gradient(0deg, rgba(34,197,139,.05) 0px, rgba(34,197,139,.05) 1px, transparent 1px, transparent 34px),
      repeating-linear-gradient(90deg, rgba(34,197,139,.05) 0px, rgba(34,197,139,.05) 1px, transparent 1px, transparent 34px);}
  .tactical-board::after{content:'';position:absolute; left:50%; top:50%; width:90px; height:90px; margin:-45px 0 0 -45px;

  .bid-flash{animation:bidFlash .6s ease;}

  label.small{font-size:12px; color:var(--muted); display:block; margin-bottom:4px; font-weight:600;}
  .field{margin-bottom:12px;}
  ::placeholder{color:#5c5c63;}
  .link{color:var(--gold-soft); cursor:pointer; text-decoration:underline;}
  .statbox{padding:14px; border-radius:14px; background:var(--glass); border:1px solid var(--line); text-align:center;}
  .statbox .v{font-family:'Anton',sans-serif; font-size:26px; color:var(--gold-soft);}
  .statbox .l{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
  .award{padding:14px; border-radius:14px; background:linear-gradient(135deg,rgba(212,175,55,.10),transparent); border:1px solid var(--line);}
  .rating-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
  .rating-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-soft));border-radius:4px;transition:width .5s ease;}
  .lobby-card{transition:.25s ease;}
  .lobby-card:hover{transform:translateY(-4px); box-shadow:0 20px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(212,175,55,.15);}
  @media (max-width:760px){
    .grid{grid-template-columns:1fr !important;}
    .container{padding:14px 10px 50px;}
    .topbar{padding:10px 12px;flex-wrap:wrap;gap:8px;}
    .topbar .brand{font-size:15px;flex-wrap:wrap;}
    .tabs{gap:5px;}
    .tab{padding:7px 11px;font-size:12px;}
    .timer-ring{width:96px !important;height:96px !important;}
    .timer-ring svg{width:96px;height:96px;}
    .pitch{min-height:340px;}
    .player-chip{width:52px !important;}
    .player-chip .dot{width:32px;height:32px;font-size:10px;}
    .slot-label{font-size:8px;}
    .slot-name{font-size:8px;}
    .slot-select{width:70px;font-size:9px;}
    .avatar{width:80px !important;height:80px !important;font-size:24px !important;}
    .disp{letter-spacing:.01em;}
    .login-chip{display:none;}
    .login-chip:nth-child(-n+3){display:flex;}
  }
</style>

<div class="stadium-particles" id="stadiumParticles"></div>
<div id="app"></div>
<script>
  (function(){
    const layer = document.getElementById('stadiumParticles');
    const n = 22;
    for(let i=0;i<n;i++){
      const d = document.createElement('div');
      d.className='particle';
      d.style.left = (Math.random()*100)+'vw';
      d.style.animationDuration = (14+Math.random()*16)+'s';
      d.style.animationDelay = (-Math.random()*20)+'s';
      const s = 1.5+Math.random()*2.5;
      d.style.width=s+'px'; d.style.height=s+'px';
      d.style.opacity = (0.15+Math.random()*0.25).toFixed(2);
      layer.appendChild(d);
    }
  })();
</script>

function stripTag(name){ return name.replace(/\s*\([^)]*\)\s*$/,'').trim(); }
const DETAIL_POS_GROUPS = { GK:['GK'], DEF:['CB','LB','RB'], MID:['CDM','CM','CAM'], FWD:['ST','LW','RW','CF'] };
function detailPosFor(pos, foot, name){
  const group = DETAIL_POS_GROUPS[pos] || [pos];
  const guess = DETAIL_POS_OVERRIDES[stripTag(name)];
  if(guess && group.includes(guess)) return guess; // only trust the curated guess if it fits the player's real broad position
  if(group.length===1) return group[0];
  const h = [...name].reduce((a,c)=>a+c.charCodeAt(0),0);
  if(pos==='DEF') return (foot==='Left'? ['LB','CB','CB'] : foot==='Right'? ['RB','CB','CB'] : ['CB','CB','CB'])[h%3];
  if(pos==='MID') return group[h%group.length];
  if(pos==='FWD') return (foot==='Left'? ['RW','ST','CF'] : foot==='Right'? ['LW','ST','CF'] : ['ST','CF','ST'])[h%3];
  return group[0];
}
function P(name,rating,pos,club,nation,flag,age,foot,height,value,cat){
  return {id:name.replace(/[^a-zA-Z]/g,'')+rating, name,rating,pos,detailPos:detailPosFor(pos,foot,name),
    club,nation,flag,age,foot,height,value,cat,
    start: randomStartPrice(rating, cat)};
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
// Which player categories feed each format. null = draw from the whole database (mixed exhibitions).
const FORMAT_CATEGORIES = {
  icons:        ['Icons','Legends'],
  primeLaLiga:  ['Prime LaLiga'],
  primePL:      ['Prime PL'],
  currentLaLiga:['Current LaLiga'],
  currentPL:    ['Current PL'],
  primeUCL:     ['Prime UCL'],
  currentUCL:   ['Current UCL'],
  five:         null,
  seven:        null,
  custom:       null,
};
// Fallback priority when a format's own category runs short — closest-fitting categories first,
// so a top-up never reaches for something as mismatched as a retired Icon in a Prime PL auction
// unless every closer option has already been exhausted.
const FORMAT_FALLBACK_CATS = {
  icons:        ['Icons','Legends'],
  primeLaLiga:  ['Prime LaLiga','Prime UCL','Icons','Legends'],
  primePL:      ['Prime PL','Prime UCL','Icons','Legends'],
  currentLaLiga:['Current LaLiga','Current UCL','National Teams','Wonderkids'],
  currentPL:    ['Current PL','Current UCL','National Teams','Wonderkids'],
  primeUCL:     ['Prime UCL','Icons','Legends'],
  currentUCL:   ['Current UCL','Current PL','Current LaLiga','National Teams','Wonderkids'],
};
function buildInitialPool(formatKey){
  const cats = FORMAT_CATEGORIES[formatKey];
  let list = cats? PLAYERS.filter(p=>cats.includes(p.cat)) : PLAYERS.slice();
  if(list.length===0) list = PLAYERS.slice();
  return shuffle(list).map(p=>p.id);
}
// If there aren't enough players in the pool for every manager to fill a squad, top it up
// from the closest-matching categories first (falling back to the whole database only as a
// last resort) rather than letting the auction run dry or mixing in unrelated eras/leagues.
function ensurePoolSize(l){
  const active = Object.values(l.members).filter(m=>!m.spectator);
  const needed = active.length * l.squadSize;
  if(l.pool.length >= needed) return 0;
  const already = new Set(l.pool);
  const soldIds = new Set(l.soldLog.map(s=>s.playerId));
  const gap = needed - l.pool.length;
  const chain = FORMAT_FALLBACK_CATS[l.formatKey];
  const candidates = [];
  const seen = new Set();
  function addCandidates(pool){
    pool.forEach(p=>{ if(!already.has(p.id) && !soldIds.has(p.id) && !seen.has(p.id)){ candidates.push(p); seen.add(p.id); } });
  }
  if(chain){
    for(const cat of chain){
      if(candidates.length >= gap) break;
      addCandidates(shuffle(PLAYERS.filter(p=>p.cat===cat)));
    }
  }
  if(candidates.length < gap) addCandidates(shuffle(PLAYERS)); // absolute last resort
  const toAdd = candidates.slice(0, gap);
  if(toAdd.length){ l.pool = shuffle([...l.pool, ...toAdd.map(p=>p.id)]); }
  return toAdd.length;
}
function pitchSizeFor(formatKey, squadSize){
  const f = FORMATS[formatKey];
  if(f && f.pitchSize) return f.pitchSize; // fixed formats always use their real on-pitch size
  // Custom mode has no fixed pitch size, so infer a sensible one from the chosen squad size.
  if(squadSize<=6) return 5;
  if(squadSize<=9) return 7;
  return 11;
}
function formationSetFor(formatKey, squadSize){ return FORMATIONS[pitchSizeFor(formatKey, squadSize)]; }
function defaultFormation(formatKey, squadSize){ return formationSetFor(formatKey, squadSize)[0]; }

function labelBucket(label){
  if(['LB','CB','RB','LWB','RWB'].includes(label)) return 'DEF';
  if(['CDM','CM','CAM','LM','RM'].includes(label)) return 'MID';
  return 'FWD'; // LW, ST, RW

// Computes which squad player sits in each formation slot: respects a manager's manual
// assignments (m.lineup) where still valid, and auto-fills the rest from the squad pool.
function computeLineup(m, l){
  const formation = m.formation || defaultFormation(l.formatKey, l.squadSize);
  const rows = FORMATION_LABELS[formation] || [];
  const squadPlayers = m.squad.map(id=>PLAYERS.find(p=>p.id===id)).filter(Boolean);
  const squadIds = new Set(squadPlayers.map(p=>p.id));
  const manual = m.lineup || {};
  const assigned = new Set();
  let gkId = (manual.gk && squadIds.has(manual.gk)) ? manual.gk : null;
  if(gkId) assigned.add(gkId);
  const slots = [{key:'gk', label:'GK', bucket:'GK', playerId:gkId}];
  rows.forEach((row,ri)=>{
    row.forEach((label,ci)=>{
      const key = `r${ri}_${ci}`;
      const bucket = labelBucket(label);
      let pid = manual[key];
      if(pid && squadIds.has(pid) && !assigned.has(pid)){ assigned.add(pid); } else { pid = null; }
      slots.push({key, label, bucket, row:ri, col:ci, playerId:pid});
    });
  });
  const extras = squadPlayers.filter(p=>!assigned.has(p.id));
  return {slots, extras, rows};
}

function synthAttrs(p){
  const override = STAR_OVERRIDES.find(s=>p.name.includes(s.match));
  if(override) return override.attrs;
  const bias = POS_BIAS[p.pos]||POS_BIAS.MID;
  const candidates = POS_PRIMARY_CANDIDATES[p.pos]||['PAS'];
  const primary = candidates[Math.abs(seedRand(p.id,99))%candidates.length];
  const weakCandidates = Object.keys(bias).filter(k=>k!==primary);
  const weak = weakCandidates[Math.abs(seedRand(p.id,55))%weakCandidates.length];
  const out={};
  Object.keys(bias).forEach((k,i)=>{
    let base = Math.round(p.rating*bias[k]) + seedRand(p.id,i*7)*0.6;
    if(k===weak) base -= 10 + (Math.abs(seedRand(p.id,77))%8);
    out[k] = Math.max(25, Math.min(99, Math.round(base)));
  });
  // guarantee a genuine standout: the primary attribute clears ~90 for anyone rated 80+
  if(p.rating>=80) out[primary] = Math.max(out[primary], Math.min(99, 88 + Math.round((p.rating-80)/2)));
  else out[primary] = Math.max(out[primary], Math.min(94, p.rating+8));
  return out;
}

  const r = el.getBoundingClientRect();
  const x = (e.clientX - r.left)/r.width - 0.5;
  const y = (e.clientY - r.top)/r.height - 0.5;
  el.style.transform = `perspective(700px) rotateY(${(x*12).toFixed(2)}deg) rotateX(${(-y*12).toFixed(2)}deg) scale(1.03)`;
}
function resetTilt(el){ el.style.transform = 'perspective(700px) rotateY(0deg) rotateX(0deg) scale(1)'; }
function fmt(n){
  if(n>=1e9) return "$"+(n/1e9).toFixed(2)+"B";
  if(n>=1e6) return "$"+(n/1e6).toFixed(1).replace(/\.0$/,'')+"M";
  if(n>=1e3) return "$"+(n/1e3).toFixed(0)+"K";
  return "$"+n;
}
function uid(){return Math.random().toString(36).slice(2,9);}
function code(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s='';for(let i=0;i<5;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function remainingSeconds(l){
  if(l.status==='paused') return l.pausedRemaining!=null? l.pausedRemaining : l.timerLen;
  return phaseRemainingSeconds(l);
}
// Anchors this client's own local stopwatch the moment it sees phaseNonce change, then counts
// down using only this client's own clock. Never compares one device's Date.now() to another's.
function syncPhase(l){
  if(S.phaseNonceSeen !== l.phaseNonce){
    S.phaseNonceSeen = l.phaseNonce;
    S.phaseStartedAt = Date.now();
    S.phaseMsSeen = l.phaseMs;
  }
}
function phaseRemainingMs(l){
  syncPhase(l);
  if(S.phaseStartedAt==null) return 0;
  return Math.max(0, S.phaseMsSeen - (Date.now()-S.phaseStartedAt));
}
function phaseRemainingSeconds(l){ return Math.ceil(phaseRemainingMs(l)/1000); }
// Bumps the countdown to a fresh duration and marks it as a new phase for every client to
// re-anchor against, locally, on their own clock.
function armPhase(l, durationMs){
  l.phaseNonce = (l.phaseNonce||0) + 1;
  l.phaseMs = durationMs;
}
function reviewRemaining(l){
  if(l.status!=='ended') return 0;
  return phaseRemainingSeconds(l);
}
function fmtClock(secs){ const m=Math.floor(secs/60), s=secs%60; return `${m}:${s.toString().padStart(2,'0')}`; }
function initials(n){return n.split(' ').filter(w=>!/[()]/.test(w)).map(w=>w[0]).slice(0,2).join('').toUpperCase();}
// Small original SVG "player badge" — a simple head-and-shoulders silhouette colored by
// position, with initials on the head. Used everywhere a player avatar shows up, since we
// have no way to fetch real photos here (and wouldn't want to use real players' likenesses
// without rights to them anyway).
function playerIcon(p, size){
  size = size || 48;
  const posColors = {GK:'#e0b23c', DEF:'#4f8ff5', MID:'#3ecf8e', FWD:'#e05a5a'};
  const c = posColors[p.pos] || '#9aa0a8';
  return `<svg viewBox="0 0 64 64" width="${size}" height="${size}" style="display:block;">
    <circle cx="32" cy="32" r="32" fill="${c}" opacity=".22"/>
    <circle cx="32" cy="23" r="10.5" fill="${c}"/>
    <path d="M13 60 C13 44.5 20.5 36 32 36 C43.5 36 51 44.5 51 60 Z" fill="${c}"/>
    <text x="32" y="27.5" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="10.5" fill="rgba(10,10,12,.85)">${initials(p.name)}</text>
  </svg>`;
}

/* ---------------------------- STORAGE HELPERS ---------------------------- */
async function sGet(key, shared){try{const r= await window.storage.get(key, !!shared); return r? JSON.parse(r.value): null;}catch(e){return null;}}
async function sSet(key, val, shared, _attempt){
  _attempt = _attempt || 0;
  try{
    await window.storage.set(key, JSON.stringify(val), !!shared);
    return true;
  }catch(e){
    // The storage backend occasionally returns a transient "Internal server error" —
    // retry a couple of times with a short backoff before giving up. This was the
    // real cause behind a lot of the "sometimes it works, sometimes it doesn't"
    // multiplayer flakiness: a write would silently fail and every other client
    // would just never see that change.
    if(_attempt < 2){
      await new Promise(r=>setTimeout(r, 300*(_attempt+1)));
      return sSet(key, val, shared, _attempt+1);
    }
    console.error('Storage write failed after retries:', e);
    return false;
  }
}
// Writes league state and warns the user if it truly didn't stick after retries,
// instead of silently rendering as if the save succeeded.
async function persistLeague(l){
  const ok = await sSet('league:'+l.code, l, true);
  if(!ok) toast('⚠️ Sync hiccup — that action may not have saved. Try it again.');
  return ok;
}

function toast(msg){
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>{el.style.transition='opacity .4s'; el.style.opacity='0'; setTimeout(()=>el.remove(),400)},2600);
}
function beep(freq=440,dur=.12,type='sine',vol=.06){
  if(!S.soundOn) return;
  try{
    const ctx = beep._ctx || (beep._ctx = new (window.AudioContext||window.webkitAudioContext)());
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=vol;
    o.connect(g); g.connect(ctx.destination); o.start();
    g.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime+dur);
    o.stop(ctx.currentTime+dur+.02);
  }catch(e){}
}
function sfxBid(){beep(660,.09,'triangle',.05);}
function sfxSold(){beep(220,.05,'sawtooth',.05); setTimeout(()=>beep(440,.08,'sawtooth',.06),90); setTimeout(()=>beep(660,.16,'sawtooth',.07),200);}
function sfxWarn(){beep(880,.08,'square',.04);}
function sfxNotify(){beep(520,.06,'sine',.05);}

function confetti(){
  const colors=['#d4af37','#22c58b','#f6f5f1','#e14b4b'];
  for(let i=0;i<60;i++){
    const d=document.createElement('div'); d.className='confetti-piece';
    d.style.left=Math.random()*100+'vw'; d.style.background=colors[i%colors.length];
    d.style.animation=`fall ${1.4+Math.random()*1.4}s ease-in forwards`;
    d.style.animationDelay=(Math.random()*.4)+'s';
    document.body.appendChild(d); setTimeout(()=>d.remove(),3200);
  }
}

/* ---------------------------- LEAGUE MODEL ---------------------------- */
function newLeague(hostId, hostName, formatKey, opts){
  const f = FORMATS[formatKey];
  const budget = opts.budget || f.budget;
  const squad = opts.squad || f.squad;
  const timerLen = opts.timer || f.timer;
  return {
    code: S.code,
    formatKey, formatLabel:f.label, budget, squadSize:squad, timerLen,
    positionRestrictions: opts.positionRestrictions !== undefined? opts.positionRestrictions : true,
    allowDuplicates: !!opts.allowDuplicates,
    nominationOrder: opts.nominationOrder || 'round-robin',
    hostId, hostName,
    members: { [hostId]: {id:hostId, name:hostName, budget, spent:0, squad:[], connected:true, spectator:false, formation:defaultFormation(formatKey, squad), lineup:{}} },
    status:'waiting', // waiting, running, paused, ended
    pool: buildInitialPool(formatKey), // shuffled, category-matched pool of player ids
    soldLog: [], // {playerId, buyerId, price, ts}
    passLog: [],
    currentPlayerId:null,
    currentBid:0, currentBidder:null,
    bidHistory: [],
    outForCurrentPlayer: [],
    lastSale: null,
    // Countdown system: each client runs its own local stopwatch, anchored the moment it
    // observes phaseNonce change, counting down phaseMs using only its OWN clock's passage
    // of time. This makes every timer immune to clock skew between devices — we never once
    // compare one device's Date.now() to a timestamp written by a different device.
    phaseNonce: 0,
    phaseMs: 0,
    awaitingReady: false, // true while waiting for majority ready-check before bidding starts
    awaitingHostPick: false, // true while the host has a 20s window to choose the next player
    awaitingIntermission: false, // true during the 5s pause between a sale and the next reveal
    readyVotes: [],
    notInterested: [], // members who opted out of bidding on the current player before bidding even starts
    pausedRemaining: null,
    nominationIdx: 0,
    lastUpdate: Date.now(),
    chat: [{sys:true, text:`League created by ${hostName}. Format: ${f.label}`, ts:Date.now()}],
    version: 0,
  };
}

async function saveLeague(mutator, _attempt){
  _attempt = _attempt || 0;
  // read-modify-write against freshest copy to reduce clobbering
  let l = await sGet('league:'+S.code, true);
  if(!l) l = S.league;
  const versionBefore = l.version||0;
  mutator(l);
  l.lastUpdate = Date.now(); l.version=versionBefore+1;
  // One more check right before committing: if something else changed in the moments
  // between our read and our write (very possible — the storage backend itself can lag
  // or retry), redo the mutation on top of that fresher data instead of blindly writing
  // over it. Without this, a slightly-late write (e.g. a second quick click while the
  // first one was still saving) could silently overwrite a newer state and make the bid
  // timer appear to jump backward/reset.
  if(_attempt < 2){
    const check = await sGet('league:'+S.code, true);
    if(check && (check.version||0) > versionBefore){
      return saveLeague(mutator, _attempt+1);
    }
  }
  S.league = l;
  await persistLeague(l);
  render();
}

async function pollLeague(){
  if(!S.code) return;
  const l = await sGet('league:'+S.code, true);
  if(!l) return;
  // Only ever move forward in version. Without this guard, a poll fetch that was already
  // in flight when we made our own local write can resolve afterwards with the older,
  // pre-write snapshot and briefly roll the whole UI (and the bid timer) back a step —
  // which is exactly what caused the repeated 25/24 flicker and the "multiple refreshes".
  if(S.league && (l.version||0) <= (S.league.version||0)) return;
  const prev = S.league;
  S.league = l;
  reactToChanges(prev, l);
  render();
}
function reactToChanges(prev, cur){
  if(!prev) return;
  if(cur.chat && cur.chat.length > (prev.chat||[]).length){
    const last = cur.chat[cur.chat.length-1];
    if(!last.sys && last.uid !== S.me.id) sfxNotify();
  }
  if(cur.currentBidder && cur.currentBid > (prev.currentBid||0)){
    flashBidAmount();
    if(cur.currentBidder!==S.me.id){
      sfxBid();
      if(prev.currentBidder===S.me.id) toast("You've been outbid!");
    }
  }
  if((cur.soldLog||[]).length > (prev.soldLog||[]).length){
    const sale = cur.soldLog[cur.soldLog.length-1];
    const p = PLAYERS.find(x=>x.id===sale.playerId);
    const buyer = cur.members[sale.buyerId];
    sfxSold();
    if(sale.buyerId===S.me.id){ confetti(); toast(`🎉 You won ${p.name} for ${fmt(sale.price)}!`); }
    else { toast(`✅ ${p.name} sold to ${buyer? buyer.name:'?'} for ${fmt(sale.price)}`); }
  }
}

/* ---------------------------- HOST AUCTION ENGINE ---------------------------- */
function isHost(){ return S.league && S.league.hostId===S.me.id; }

function pickNextPlayerId(l){
  const available = l.pool.filter(id=>{
    if(l.allowDuplicates) return true;
    return !Object.values(l.members).some(m=>m.squad.includes(id));
  });
  if(available.length===0) return null;
  // simple order: as listed
  return available[0];
}

async function hostStartAuction(){
  S.editingStartPrice = false;
  await saveLeague(l=>{
    l.status='running';
    if(!l.currentPlayerId && !l.awaitingHostPick){
      const added = ensurePoolSize(l);
      if(added>0) l.chat.push({sys:true, text:`Pool topped up with ${added} extra players so everyone can fill a full squad.`, ts:Date.now()});
      if(pickNextPlayerId(l)){
        l.awaitingHostPick = true;
        armPhase(l, 20000);
        l.chat.push({sys:true, text:'Auction started by host. 🎯 Host has 20s to choose the first player (or one is auto-picked).', ts:Date.now()});
      } else {
        l.chat.push({sys:true, text:'Auction started by host.', ts:Date.now()});
      }
    }
  });
  startClock();
}
function hostPause(){
  saveLeague(l=>{
    l.pausedRemaining = remainingSeconds(l);
    l.status='paused';
    l.chat.push({sys:true,text:'Host paused the auction.',ts:Date.now()});
  });
}
function hostResume(){
  saveLeague(l=>{
    l.status='running';
    armPhase(l, (l.pausedRemaining!=null? l.pausedRemaining : l.timerLen)*1000);
    l.pausedRemaining = null;
    l.chat.push({sys:true,text:'Host resumed the auction.',ts:Date.now()});
  });
}
const REVIEW_MS = 3*60*1000; // 3 minutes to finalize lineups before the summary reveals
function hostEnd(){
  saveLeague(l=>{
    l.status='ended'; l.currentPlayerId=null;
    armPhase(l, REVIEW_MS);
    l.chat.push({sys:true,text:'🏁 Host ended the auction. Finalize your lineup before the summary reveals.',ts:Date.now()});
  });
}
function hostRevealSummaryNow(){
  saveLeague(l=>{ armPhase(l, 0); l.chat.push({sys:true,text:'Host revealed the summary early.',ts:Date.now()}); });
}
function hostSkip(){
  S.editingStartPrice = false;
  saveLeague(l=>{
    if(l.currentPlayerId){ l.passLog.push({playerId:l.currentPlayerId, ts:Date.now()}); l.pool = l.pool.filter(id=>id!==l.currentPlayerId); }
    l.currentPlayerId=null; l.currentBid=0; l.currentBidder=null; l.bidHistory=[]; l.outForCurrentPlayer=[];
    l.readyVotes=[]; l.notInterested=[]; l.awaitingReady = false;
    if(pickNextPlayerId(l)){
      l.awaitingHostPick = true;
      armPhase(l, 20000);
      l.chat.push({sys:true,text:'Host skipped the player. 🎯 Host has 20s to choose the next player (or one is auto-picked).',ts:Date.now()});
    } else {
      l.status='ended'; armPhase(l, REVIEW_MS);
      l.chat.push({sys:true,text:'🏁 All players processed. Auction complete! Finalize your lineup before the summary reveals.',ts:Date.now()});
    }
  });
}
function hostSkipToFive(){
  saveLeague(l=>{
    if(l.status==='running' && l.currentPlayerId && remainingSeconds(l)>5){
      armPhase(l, 5000);
      l.chat.push({sys:true,text:'⏩ Host fast-forwarded to the final 5 seconds!',ts:Date.now()});
    }
  });
}
function submitStartPrice(){
  const v = parseInt(document.getElementById('startPriceIn').value);
  if(!v || v<=0) return toast('Enter a valid starting price.');
  S.editingStartPrice = false;
  saveLeague(l=>{
    if(l.currentPlayerId && !l.currentBidder){
      l.currentBid = v;
      const p = PLAYERS.find(x=>x.id===l.currentPlayerId);
      l.chat.push({sys:true, text:`Host set the starting price for ${p?p.name:'this player'} to ${fmt(v)}.`, ts:Date.now()});
    }
  });
}
function hostUndo(){
  saveLeague(l=>{
    const last = l.soldLog.pop();
    if(last){
      const m = l.members[last.buyerId];
      if(m){ m.budget += last.price; m.spent -= last.price; m.squad = m.squad.filter(id=>id!==last.playerId); }
      l.pool.unshift(last.playerId);
      l.chat.push({sys:true,text:`Host undid the sale of ${PLAYERS.find(p=>p.id===last.playerId).name}.`,ts:Date.now()});
    }
  });
}
function hostKick(memberId){
  saveLeague(l=>{ if(l.members[memberId]){ l.chat.push({sys:true,text:`${l.members[memberId].name} was removed by host.`,ts:Date.now()}); delete l.members[memberId]; } });
}
function hostAdjustBudget(memberId, delta){
  saveLeague(l=>{ if(l.members[memberId]) l.members[memberId].budget += delta; });
}

function startClock(){
  stopClock();
  let warned = false;
  S.clockTick = setInterval(async ()=>{
    if(S.screen!=='room' || !S.league) return;
    const l = S.league;
    if(l.status==='paused'){ warned=false; return; }
    if(l.status==='ended'){
      if(phaseRemainingMs(l)>0 && (S.tab==='auction'||S.tab==='summary')) render();
      return;
    }
    if(l.status!=='running'){ warned=false; return; }
    if(!l.currentPlayerId && l.awaitingIntermission){
      const remIntermission = phaseRemainingSeconds(l);
      if(remIntermission>0){ if(!patchIntermissionCountdown(l)){ if(S.tab==='auction') render(); } return; }
      if(!isHost()) return;
      await hostBeginPick();
      return;
    }
    if(!l.currentPlayerId && l.awaitingHostPick){
      const remPick = phaseRemainingSeconds(l);
      if(remPick>0){
        if(!patchHostPickCountdown(l)){ if(S.tab==='auction'||S.tab==='host') render(); }
        return;
      }
      if(!isHost()) return;
      await hostAutoPickExpiredPick();
      return;
    }
    if(!l.currentPlayerId) return;
    if(l.awaitingReady) return; // no live countdown here — poll already re-renders when someone votes
    const remaining = remainingSeconds(l);
    if(remaining<=3 && remaining>0 && !warned){ warned=true; sfxWarn(); }
    if(remaining>3) warned=false;
    if(remaining>0){
      if(S.tab==='auction'){ if(!patchTimerDisplay()) render(); }
      S.zeroSince = null;
      return;
    }
    if(isHost()){ await hostFinalizeCurrentPlayer(); return; }
    // Safety net: normally only the host finalizes a sale. But if the host's tab is
    // backgrounded/throttled (very common on mobile), nothing would ever advance and
    // everyone else would be stuck watching the timer sit at 0 indefinitely. If it's
    // been stuck for more than a few seconds, another client steps in instead.
    if(!S.zeroSince) S.zeroSince = Date.now();
    if(Date.now() - S.zeroSince > 4000){ S.zeroSince = null; await hostFinalizeCurrentPlayer(); }
  }, 1000);
}
function stopClock(){ if(S.clockTick){ clearInterval(S.clockTick); S.clockTick=null; } }
// Updates just the countdown ring/badge in place each second, instead of re-rendering the
// whole page — avoids the "flashing/refreshing" look a full render() would cause every tick.
function patchTimerDisplay(){
  const l = S.league;
  if(!l || !l.currentPlayerId) return false;
  const remaining = remainingSeconds(l);
  const ringColor = remaining<=5? 'var(--crimson)': remaining<=10? 'var(--gold)':'var(--emerald)';
  const pct = Math.min(100, Math.round((remaining/l.timerLen)*100));
  const circle = document.getElementById('timerRingCircle');
  const text = document.getElementById('timerRingText');
  const badge = document.getElementById('timerBadge');
  if(!circle || !text || !badge) return false;
  const r=52, C=2*Math.PI*r;
  circle.setAttribute('stroke-dashoffset', C*(1-pct/100));
  circle.setAttribute('stroke', ringColor);
  text.textContent = remaining;
  text.style.color = ringColor;
  badge.textContent = '⏱ '+remaining+'s';
  badge.style.color = ringColor;
  badge.style.borderColor = ringColor;
  badge.classList.toggle('pulse-red-timer', remaining<=5);
  document.getElementById('timerRing')?.classList.toggle('pulse-red-timer', remaining<=5);
  return true;
}

async function hostFinalizeCurrentPlayer(){
  let l = await sGet('league:'+S.code, true) || S.league;
  if(l.status!=='running'){ S.league=l; render(); return; }
  if(!l.currentPlayerId){ S.league=l; render(); return; } // someone else already finalized this round
  if(phaseRemainingMs(l) > 0){ S.league=l; render(); return; } // a last-second bid already extended it
  const soldPlayer = PLAYERS.find(x=>x.id===l.currentPlayerId);
  if(l.currentBidder){
    const buyer = l.members[l.currentBidder];
    buyer.budget -= l.currentBid; buyer.spent += l.currentBid; buyer.squad.push(l.currentPlayerId);
    l.soldLog.push({playerId:l.currentPlayerId, buyerId:l.currentBidder, price:l.currentBid, ts:Date.now()});
    l.lastSale = {playerName:soldPlayer.name, buyerName:buyer.name, price:l.currentBid, unsold:false, ts:Date.now()};
  } else {
    l.passLog.push({playerId:l.currentPlayerId, ts:Date.now()});
    l.lastSale = {playerName:soldPlayer.name, buyerName:null, price:0, unsold:true, ts:Date.now()};
  }
  l.pool = l.pool.filter(id=>id!==l.currentPlayerId);
  const activeManagers = Object.values(l.members).filter(m=>!m.spectator);
  const allSquadsFull = activeManagers.length>0 && activeManagers.every(m=>m.squad.length>=l.squadSize);
  l.currentPlayerId = null; l.currentBid = 0; l.currentBidder = null; l.bidHistory=[]; l.outForCurrentPlayer=[];
  l.readyVotes=[]; l.notInterested=[]; l.awaitingReady=false;
  if(allSquadsFull){
    l.status='ended'; armPhase(l, REVIEW_MS);
    l.chat.push({sys:true,text:'🏁 Every squad is full — auction complete! Finalize your lineup before the summary reveals.',ts:Date.now()});
  } else if(!pickNextPlayerId(l)){
    l.status='ended'; armPhase(l, REVIEW_MS);
    l.chat.push({sys:true,text:'🏁 All players processed. Auction complete! Finalize your lineup before the summary reveals.',ts:Date.now()});
  } else {
    // pause on the sold/unsold banner for 5s before revealing the next player
    l.awaitingIntermission = true;
    armPhase(l, 5000);
  }
  l.lastUpdate=Date.now(); l.version=(l.version||0)+1;
  S.league=l; await persistLeague(l); render();
}
// Opens the host's 20s "choose the next player" window instead of auto-picking immediately.
async function hostBeginPick(){
  S.editingStartPrice = false;
  let l = await sGet('league:'+S.code, true) || S.league;
  if(l.status!=='running' || l.currentPlayerId || l.awaitingHostPick){ S.league=l; render(); return; }
  if(!l.awaitingIntermission){ S.league=l; render(); return; }
  if(phaseRemainingMs(l) > 0){ S.league=l; render(); return; }
  l.awaitingIntermission = false;
  if(!pickNextPlayerId(l)){
    l.status='ended'; armPhase(l, REVIEW_MS);
    l.chat.push({sys:true,text:'🏁 All players processed. Auction complete! Finalize your lineup before the summary reveals.',ts:Date.now()});
  } else {
    l.awaitingHostPick = true;
    armPhase(l, 20000);
    l.chat.push({sys:true,text:'🎯 Host has 20s to choose the next player (or one is auto-picked).',ts:Date.now()});
  }
  l.lastUpdate=Date.now(); l.version=(l.version||0)+1;
  S.league=l; await persistLeague(l); render();
}
// Called by the host's own clock tick once the 20s picking window has expired without a choice.
async function hostAutoPickExpiredPick(){
  let l = await sGet('league:'+S.code, true) || S.league;
  if(l.status!=='running' || !l.awaitingHostPick){ S.league=l; render(); return; }
  if(phaseRemainingMs(l) > 0){ S.league=l; render(); return; }
  const nid = pickNextPlayerId(l);
  l.awaitingHostPick = false;
  if(!nid){
    l.status='ended'; armPhase(l, REVIEW_MS);
    l.chat.push({sys:true,text:'🏁 All players processed. Auction complete! Finalize your lineup before the summary reveals.',ts:Date.now()});
  } else {
    const np = PLAYERS.find(x=>x.id===nid);
    l.currentPlayerId = nid;
    l.currentBid = np.start;

// Shortens the current player's timer to 2s once nobody eligible remains to keep bidding —
// runs opportunistically off already-fetched state, so it costs no extra storage reads.
function maybeShortenTimer(l){
  if(!l.currentPlayerId || l.status!=='running') return false;
  const outList = l.outForCurrentPlayer || [];
  const active = Object.values(l.members).filter(m=>!m.spectator);
  if(active.length<=1) return false; // nothing meaningful to fast-forward with only one bidder
  const stillIn = active.filter(m=> !outList.includes(m.id) && m.squad.length<l.squadSize);
  let shorten=false;
  if(l.currentBidder){ if(stillIn.filter(m=>m.id!==l.currentBidder).length===0) shorten=true; }
  else if(stillIn.length===0) shorten=true;
  if(shorten && phaseRemainingSeconds(l) > 2){ armPhase(l, 2000); return true; }
  return false;
}

/* ---------------------------- CLIENT ACTIONS ---------------------------- */
function checkReadyMajority(l){
  if(!l.awaitingReady) return;
  const active = Object.values(l.members).filter(m=>!m.spectator);
  const needed = Math.floor(active.length/2)+1;
  const votes = (l.readyVotes||[]).filter(id=>l.members[id] && !l.members[id].spectator);
  if(votes.length>=needed){
    l.awaitingReady = false;
    armPhase(l, l.timerLen*1000);
    // anyone who said they weren't interested in this player sits out the bidding automatically
    l.outForCurrentPlayer = Array.from(new Set([...(l.outForCurrentPlayer||[]), ...(l.notInterested||[])]));
    l.chat.push({sys:true,text:'✅ Majority ready — bidding is live!',ts:Date.now()});
  }
}
async function toggleReady(){
  await saveLeague(l=>{
    if(!l.awaitingReady || !l.currentPlayerId) return;
    const me = l.members[S.me.id];
    if(!me || me.spectator) return;
    l.readyVotes = l.readyVotes || [];
    const idx = l.readyVotes.indexOf(S.me.id);
    if(idx>=0) l.readyVotes.splice(idx,1);
    else {
      l.readyVotes.push(S.me.id);
      // opting back in to bid clears a previous "not interested" opinion
      l.notInterested = (l.notInterested||[]).filter(id=>id!==S.me.id);
    }
    checkReadyMajority(l);
  });
}
// Lets a manager say up front they don't want to bid on the current player — it still
// counts toward starting the round (so they don't hold up the majority), but marks them
// out for this player once bidding begins, same as if they'd hit "Out" mid-round.
async function toggleNotInterested(){
  await saveLeague(l=>{
    if(!l.awaitingReady || !l.currentPlayerId) return;
    const me = l.members[S.me.id];
    if(!me || me.spectator) return;
    l.notInterested = l.notInterested || [];
    const idx = l.notInterested.indexOf(S.me.id);
    if(idx>=0){ l.notInterested.splice(idx,1); }
    else {
      l.notInterested.push(S.me.id);
      l.readyVotes = l.readyVotes || [];
      if(!l.readyVotes.includes(S.me.id)) l.readyVotes.push(S.me.id);
    }
    checkReadyMajority(l);
  });
}

async function placeBid(amount){
  let l = await sGet('league:'+S.code, true) || S.league;
  const me = l.members[S.me.id];
  if(!me || me.spectator) return toast("Spectators can't bid.");
  if(l.status!=='running') return toast('Auction is not live.');
  if(!l.currentPlayerId) return;
  if(l.awaitingReady) return toast('Bidding hasn\'t started yet — waiting on the ready-check.');
  if((l.outForCurrentPlayer||[]).includes(S.me.id)) return toast("You're out on this player — wait for the next one.");
  if(amount<=l.currentBid) return toast('Bid must be higher than current bid.');
  if(amount> me.budget) return toast('Not enough budget.');
  if(l.squadSize && me.squad.length>=l.squadSize) return toast('Your squad is already full.');
  if(l.positionRestrictions){
    const p = PLAYERS.find(x=>x.id===l.currentPlayerId);
    const need = positionNeed(l, me);
    if(need[p.pos]<=0) return toast(`You already filled the ${p.pos} quota.`);
  }
  // Re-check for a concurrent bid right before writing — the storage layer is last-write-wins,
  // so two people bidding within the same instant could otherwise silently clobber each other.
  // Only ever adopt this second read if it's strictly newer than what we already have — a
  // stale/slow read landing here (the storage backend can lag or hiccup) must never regress
  // the bid or timer back to an older snapshot right before we write.
  const fresh = await sGet('league:'+S.code, true);
  if(fresh && (fresh.version||0) > (l.version||0)){
    if(fresh.currentPlayerId !== l.currentPlayerId){ S.league=fresh; render(); return toast('That player is no longer up for auction.'); }
    if(amount <= (fresh.currentBid||0)){
      S.league=fresh; render();
      return toast(`Too slow — ${fresh.members[fresh.currentBidder]?.name||'someone'} just bid ${fmt(fresh.currentBid)}.`);
    }
    l = fresh;
  }
  l.currentBid = amount; l.currentBidder = S.me.id;
  l.bidHistory.unshift({bidder:S.me.id, name:me.name, amount, ts:Date.now()});
  if(l.bidHistory.length>12) l.bidHistory.length=12;
  armPhase(l, l.timerLen*1000); // every bid gives everyone the full countdown again
  l.lastUpdate=Date.now(); l.version=(l.version||0)+1;
  S.league=l; await persistLeague(l); render();
  flashBidAmount();
}
function flashBidAmount(){
  requestAnimationFrame(()=>{
    const el = document.getElementById('currentBidAmt');
    if(!el) return;
    el.classList.remove('bid-flash'); void el.offsetWidth; el.classList.add('bid-flash');
  });
}
function positionNeed(l, member){
  const size = l.squadSize;
  let need={GK:1, DEF:Math.round(size*0.36), MID:Math.round(size*0.36), FWD:size - 1 - Math.round(size*0.36)*2};
  Object.keys(need).forEach(k=>{ if(need[k]<0) need[k]=0; });
  const have={GK:0,DEF:0,MID:0,FWD:0};
  member.squad.forEach(id=>{ const p=PLAYERS.find(x=>x.id===id); if(p) have[p.pos]=(have[p.pos]||0)+1; });
  const remain={}; Object.keys(need).forEach(k=> remain[k]= (member.squad.length>=size)?0: 999); // relax: just cap total
  Object.keys(need).forEach(k=> remain[k]= Math.max(0, need[k]-(have[k]||0)) + (size-Object.values(need).reduce((a,b)=>a+b,0)>0?1:0));
  // simplify: allow bidding on any position as long as squad not full and that bucket not overfull by >150%
  Object.keys(remain).forEach(k=> remain[k] = (member.squad.length<size)? 99:0);
  return remain;
}
async function optOut(){
  const l = await sGet('league:'+S.code, true) || S.league;
  const me = l.members[S.me.id];
  if(!me) return;
  l.outForCurrentPlayer = l.outForCurrentPlayer || [];
  if(l.outForCurrentPlayer.includes(S.me.id)) return;
  l.outForCurrentPlayer.push(S.me.id);
  let revertMsg = '';
  if(l.currentBidder === S.me.id){
    // Void this bidder's top bid so they can't win at a price they backed out of
    if(l.bidHistory.length && l.bidHistory[0].bidder === S.me.id) l.bidHistory.shift();
    const nextValid = l.bidHistory.find(b=> !l.outForCurrentPlayer.includes(b.bidder));
    if(nextValid){
      l.currentBid = nextValid.amount; l.currentBidder = nextValid.bidder;
      revertMsg = ` Bid reverts to ${nextValid.name} at ${fmt(nextValid.amount)}.`;
    } else {
      const p = PLAYERS.find(x=>x.id===l.currentPlayerId);
      l.currentBid = p? p.start : 0; l.currentBidder = null;
      revertMsg = ` Bid resets to the starting price — ${me.name}'s bid was withdrawn.`;
    }
  }
  l.chat.push({sys:true, text:`${me.name} is out of the bidding for this player.${revertMsg}`, ts:Date.now()});
  const shortened = maybeShortenTimer(l);
  l.lastUpdate=Date.now(); l.version=(l.version||0)+1;
  S.league=l; await persistLeague(l); render();
  toast(shortened? "You're out — wrapping up the bid in 2s." : "You're out — your bid was withdrawn if you were leading.");
}
async function sendChat(text){
  if(!text.trim()) return;
  await saveLeague(l=>{ l.chat.push({uid:S.me.id, name:S.me.name, text:text.trim(), ts:Date.now()}); if(l.chat.length>120) l.chat.shift(); });
}

function updateTuner(){

async function doCreate(){
  const fmtKey = document.getElementById('fmtSel').value;
  const fmtCfg = FORMATS[fmtKey];
  let squad = parseInt(document.getElementById('squadIn').value)||fmtCfg.squad;
  squad = Math.min(fmtCfg.squadMax, Math.max(fmtCfg.squadMin, squad));
  const timer = Math.min(60,Math.max(10, parseInt(document.getElementById('timerIn').value)||FORMATS[fmtKey].timer));
  const budgetEl = document.getElementById('budgetIn');
  const budget = budgetEl? parseInt(budgetEl.value): FORMATS[fmtKey].budget;
  const posRestrict = document.getElementById('posRestrict').checked;
  const allowDup = document.getElementById('allowDup').checked;
  S.code = code();
  S.league = newLeague(S.me.id, S.me.name, fmtKey, {squad, timer, budget, positionRestrictions:posRestrict, allowDuplicates:allowDup});
  const ok = await persistLeague(S.league);
  if(!ok) return toast("Couldn't create the league — multiplayer sync is down right now. Please try again.");
  await saveSession();
  enterRoom();
}
async function autoJoinFromLink(code){
  let l = await sGet('league:'+code, true);
  if(!l){ await new Promise(r=>setTimeout(r, 500)); l = await sGet('league:'+code, true); }
  if(!l){
    toast('That invite link looks invalid or expired — join manually below.');
    S.screen='lobby'; render();
    return;
  }
  if(!l.members[S.me.id]){
    l.members[S.me.id] = {id:S.me.id, name:S.me.name, budget:l.budget, spent:0, squad:[], connected:true, spectator:false, formation:defaultFormation(l.formatKey, l.squadSize), lineup:{}};
    l.chat.push({sys:true, text:`${S.me.name} joined the league.`, ts:Date.now()});
    l.version=(l.version||0)+1; l.lastUpdate=Date.now();
    const ok = await persistLeague(l);
    if(!ok){ toast("Couldn't join right now — multiplayer sync is down. Please try again."); S.screen='lobby'; render(); return; }
  }
  S.code=code; S.league=l; await saveSession(); enterRoom();
}
async function doJoin(){
  const c = document.getElementById('joinCode').value.trim().toUpperCase();
  if(!c) return toast('Enter an invite code.');
  let l = await sGet('league:'+c, true);
  if(!l){
    // Multiplayer sync can lag a moment right after a league is created — give it one
    // more short try before giving up, instead of immediately saying "not found".
    await new Promise(r=>setTimeout(r, 500));
    l = await sGet('league:'+c, true);
  }
  if(!l){
    if(S.storageOk===false) return toast("Can't reach multiplayer sync — see the warning above. You likely need the live shared link, not a downloaded file.");
    // Last resort: the code might've been stored with different spacing/case than typed —
    // check the actual list of known leagues for a case-insensitive match.
    try{
      const listing = await window.storage.list('league:', true);
      const match = (listing?.keys||[]).find(k=>k.slice('league:'.length).toUpperCase()===c);
      if(match) l = await sGet(match, true);
    }catch(e){ /* listing isn't critical — fall through to the plain error below */ }
  }
  if(!l) return toast('League not found. Double-check the code with your host — codes never use I, O, 0, or 1.');
  const spectator = document.getElementById('spectate').checked;
  if(!l.members[S.me.id]){
    l.members[S.me.id] = {id:S.me.id, name:S.me.name, budget:l.budget, spent:0, squad:[], connected:true, spectator, formation:defaultFormation(l.formatKey, l.squadSize), lineup:{}};
    l.chat.push({sys:true, text:`${S.me.name} joined the league${spectator?' as a spectator':''}.`, ts:Date.now()});
    l.version=(l.version||0)+1; l.lastUpdate=Date.now();
    const ok = await persistLeague(l);
    if(!ok) return toast("Couldn't join right now — multiplayer sync is down. Please try again.");
  }
  S.code=l.code; S.league=l; await saveSession(); enterRoom();
}
function enterRoom(){
  S.screen='room'; render();

  S.poll = setInterval(pollLeague, 1500);

// Lets a manager leave the league entirely before the auction starts. Only available in the
// waiting room — once bidding is underway, budgets/squads are in motion and leaving would be
// disruptive, so members should use "Exit" (which just steps away, still counted as a member)
// instead. Handles a graceful handoff if the person leaving happens to be the host.
async function leaveLeagueForGood(){
  if(!S.league || S.league.status!=='waiting') return toast('You can only leave before the auction starts.');
  if(!confirm("Leave this league for good? You'll be removed from the member list.")) return;
  const myId = S.me.id;
  let newHostName = null;
  await saveLeague(l=>{
    if(l.status!=='waiting') return; // safety net in case the auction started in the meantime
    const me = l.members[myId];
    if(!me) return;
    const wasHost = l.hostId === myId;
    delete l.members[myId];
    l.chat.push({sys:true, text:`${me.name} left the league.`, ts:Date.now()});
    if(wasHost){
      const remaining = Object.values(l.members);
      if(remaining.length>0){
        l.hostId = remaining[0].id;
        newHostName = remaining[0].name;
        l.chat.push({sys:true, text:`👑 ${remaining[0].name} is now the host.`, ts:Date.now()});
      }
    }
  });
  toast(newHostName? `You left the league. ${newHostName} is now hosting.` : 'You left the league.');
  leaveRoom();
}

function renderPitch(m,l,mini){
  const { slots, extras, rows } = computeLineup(m,l);
  const formation = m.formation || defaultFormation(l.formatKey, l.squadSize);
  const k = rows.length;
  const yTop=14, yBottom=72;
  const isMine = !mini && m.id===S.me.id;
  function chip(slot){
    const p = slot.playerId? PLAYERS.find(x=>x.id===slot.playerId): null;
    const last = p? p.name.replace(/\s*\(.*\)/,'').split(' ').slice(-1)[0] : null;
    if(isMine && S.openSlot===slot.key){
      const squadPlayers = m.squad.map(id=>PLAYERS.find(x=>x.id===id)).filter(Boolean);
      return `<div class="slot-label">${slot.label}</div>
        <select class="slot-select" autofocus onchange="assignSlot('${slot.key}', this.value)" onblur="closeSlotEditor()">
          <option value="">– empty –</option>
          ${squadPlayers.map(sp=>`<option value="${sp.id}" ${sp.id===slot.playerId?'selected':''}>${sp.name.length>16?sp.name.slice(0,15)+'…':sp.name} (${sp.pos})</option>`).join('')}
        </select>`;
    }
    const clickAttr = isMine? `onclick="openSlotEditor('${slot.key}')" style="cursor:pointer;"` : '';
    const dragAttr = (isMine && p)? `draggable="true" ondragstart="onSlotDragStart(event,'${p.id}','${slot.key}')"` : '';
    return `<div class="slot-label">${slot.label}</div>
      <div class="dot" ${clickAttr} ${dragAttr} title="${p?p.name+' · OVR '+p.rating+' — drag to move, click to change':(isMine?'Click or drag a squad player here':'Empty slot')}" style="${p?'':'background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.35);color:rgba(255,255,255,.45);'}">${p?playerIcon(p,40):(isMine?'+':'–')}</div>
      <div class="slot-name">${p?last:(isMine?'assign':'empty')}</div>`;
  }
  let html='';
  const gkSlot = slots.find(s=>s.key==='gk');
  const dropAttrs = isMine? (key)=>`ondragover="event.preventDefault()" ondrop="onSlotDrop(event,'${key}')"` : ()=>'';
  slots.filter(s=>s.key!=='gk').forEach(slot=>{
    const y = k>1? yBottom - slot.row*((yBottom-yTop)/(k-1)) : (yTop+yBottom)/2;
    const rowLen = rows[slot.row].length;
    const x = ((slot.col+1)/(rowLen+1))*100;
    const wide = (isMine && S.openSlot===slot.key);
    html += `<div class="player-chip" ${dropAttrs(slot.key)} style="left:${x}%;top:${y}%;${mini?'width:56px;':''}${wide?'width:96px;z-index:5;':''}">${chip(slot)}</div>`;
  });
  const gkWide = isMine && S.openSlot==='gk';
  html += `<div class="player-chip" ${dropAttrs('gk')} style="left:50%;top:90%;${mini?'width:56px;':''}${gkWide?'width:96px;z-index:5;':''}">${chip(gkSlot)}</div>`;
  return `<div class="glass" style="padding:${mini?'12px':'16px'};">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
      <div class="disp" style="font-size:${mini?13:15}px;color:var(--gold-soft);">${m.name}${m.id===l.hostId?' 👑':''} — ${formation}</div>
      ${isMine? formationSelectorHtml(m,l): ''}
    </div>
    <div class="pitch" style="${mini?'min-height:300px;':''}">${html}</div>
    ${isMine? `<div style="margin-top:10px;font-size:11px;color:var(--muted);">Drag a name from the SQUAD list onto a slot, or click a slot to pick from a list.</div>`:''}
    <div style="margin-top:10px;color:var(--muted);font-size:${mini?11:12}px;">${m.squad.length}/${l.squadSize} players · ${fmt(m.budget)} left</div>
  </div>`;
}
function formationSelectorHtml(m,l){
  const opts = formationSetFor(l.formatKey, l.squadSize);
  const current = m.formation || defaultFormation(l.formatKey, l.squadSize);
  return `<select style="width:auto;min-width:130px;" onchange="setFormation(this.value)">

function onBenchDragStart(event, playerId){
  event.dataTransfer.setData('text/plain', JSON.stringify({playerId, fromSlot:null}));
  event.dataTransfer.effectAllowed = 'move';
}
function onSlotDragStart(event, playerId, fromSlot){

  event.dataTransfer.effectAllowed = 'move';
}
function onSlotDrop(event, toSlotKey){
  event.preventDefault();
  let data; try{ data = JSON.parse(event.dataTransfer.getData('text/plain')); }catch(e){ return; }
  if(!data || !data.playerId) return;
  assignSlot(toSlotKey, data.playerId);
}
function onBenchDrop(event){
  event.preventDefault();
  let data; try{ data = JSON.parse(event.dataTransfer.getData('text/plain')); }catch(e){ return; }
  if(data && data.fromSlot) assignSlot(data.fromSlot, '');
}
async function assignSlot(slotKey, playerId){
  S.openSlot = null;
  await saveLeague(l=>{
    const m = l.members[S.me.id]; if(!m) return;
    m.lineup = m.lineup || {};
    if(playerId) m.lineup[slotKey] = playerId; else delete m.lineup[slotKey];
    // clear this player from any other slot so nobody appears twice
    Object.keys(m.lineup).forEach(k=>{ if(k!==slotKey && m.lineup[k]===playerId) delete m.lineup[k]; });
  });
}
async function setFormation(f){
  await saveLeague(l=>{ if(l.members[S.me.id]) l.members[S.me.id].formation = f; });
  toast('Formation set to '+f);

function viewSummary(l){
  const revRem = reviewRemaining(l);
  if(revRem>0){
    return `<div class="glass" style="padding:40px;text-align:center;">
      <div class="disp" style="font-size:22px;color:var(--gold-soft);">🔒 SUMMARY LOCKED</div>
      <p style="color:var(--muted);max-width:440px;margin:10px auto;">Everyone gets a chance to set their formation and lineup first. Reveals in:</p>
      <div class="disp mono" style="font-size:40px;color:var(--gold);margin:14px 0;">${fmtClock(revRem)}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-gold" onclick="setTab('squads')">Set My Lineup</button>
        ${isHost()? `<button class="btn btn-ghost" onclick="hostRevealSummaryNow()">Reveal Summary Now</button>`:''}
      </div>
    </div>`;
  }
  const members = Object.values(l.members).filter(m=>!m.spectator);
  const scored = members.map(m=>{
    const sq = m.squad.map(id=>PLAYERS.find(p=>p.id===id)).filter(Boolean);
    const { slots } = computeLineup(m,l);
    const gkSlot = slots.find(s=>s.key==='gk');
    const fwdSlots = slots.filter(s=>s.bucket==='FWD');
    const midSlots = slots.filter(s=>s.bucket==='MID');
    const defSlots = slots.filter(s=>s.bucket==='DEF');
    // Rating for a line = sum of assigned players' OVR ÷ number of positions in that line
    // (an empty slot contributes 0, which rewards actually completing your lineup).
    function lineRating(slotArr){
      if(!slotArr.length) return 0;
      const sum = slotArr.reduce((a,s)=>{ const p=s.playerId? PLAYERS.find(x=>x.id===s.playerId): null; return a+(p?p.rating:0); },0);
      return sum/slotArr.length;
    }
    const attack = lineRating(fwdSlots);
    const mid = lineRating(midSlots);
    const def = lineRating([...defSlots, gkSlot]); // defence includes the goalkeeper
    const depth = Math.min(100, Math.round((sq.length/l.squadSize)*100));
    const chemistry = Math.round(60 + Math.min(30, sq.length*2));
    const spendEff = m.spent>0? Math.min(100, Math.round((sq.reduce((a,p)=>a+p.value,0)/m.spent)*40)) : 50;
    const overall = Math.round((attack+mid+def)/3*0.6 + depth*0.15 + chemistry*0.15 + spendEff*0.1);
    return {m, sq, attack:Math.round(attack), mid:Math.round(mid), def:Math.round(def), depth, chemistry, spendEff, overall};
  }).sort((a,b)=>b.overall-a.overall);

  const awards = [];
  if(l.soldLog.length){
    const priciest = [...l.soldLog].sort((a,b)=>b.price-a.price)[0];
    awards.push({icon:'💸', title:'Most Expensive Signing', text:`${PLAYERS.find(p=>p.id===priciest.playerId).name} — ${fmt(priciest.price)} (${l.members[priciest.buyerId].name})`});
    const bargains = l.soldLog.map(s=>({...s,p:PLAYERS.find(x=>x.id===s.playerId)})).sort((a,b)=>(a.price-a.p.value)-(b.price-b.p.value))[0];
    awards.push({icon:'💰', title:'Biggest Bargain', text:`${bargains.p.name} — ${fmt(bargains.price)} (${l.members[bargains.buyerId].name})`});
  }
  if(scored.length){
    awards.push({icon:'👑', title:'Auction Champion', text:`${scored[0].m.name} — Overall rating ${scored[0].overall}/100`});
    const bestAtk=[...scored].sort((a,b)=>b.attack-a.attack)[0]; awards.push({icon:'🔥', title:'Best Attack', text:`${bestAtk.m.name} — ${bestAtk.attack} ATT`});
    const bestDef=[...scored].sort((a,b)=>b.def-a.def)[0]; awards.push({icon:'🛡', title:'Best Defense', text:`${bestDef.m.name} — ${bestDef.def} DEF`});
    const bestMid=[...scored].sort((a,b)=>b.mid-a.mid)[0]; awards.push({icon:'🎯', title:'Best Midfield', text:`${bestMid.m.name} — ${bestMid.mid} MID`});
    const richest=[...scored].sort((a,b)=>b.m.budget-a.m.budget)[0]; awards.push({icon:'🧠', title:'Smartest Spending', text:`${richest.m.name} — ${fmt(richest.m.budget)} left unspent`});
  }
  return `
  <div class="glass" style="padding:24px;margin-bottom:16px;">
    <div class="disp" style="font-size:22px;color:var(--gold-soft);margin-bottom:6px;">🏆 FINAL SUMMARY</div>
    <p style="color:var(--muted);font-size:14px;">${scored[0]? scored[0].m.name+" built the strongest all-round XI, leading on rating balance across attack, midfield and defense.":"No squads to summarize yet."} ${scored[1]? scored[1].m.name+" wasn't far behind, "+(scored[1].spendEff>scored[0].spendEff? "getting more value per dollar spent.":"but spent less efficiently overall."):''}</p>
  </div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-bottom:16px;">
    ${scored.map((s,i)=>`<div class="glass" style="padding:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:800;">${i===0?'👑 ':''}${s.m.name}</div><div class="disp" style="color:var(--gold-soft);font-size:22px;">${s.overall}</div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;">ATT ${s.attack} · MID ${s.mid} · DEF (incl. GK) ${s.def} · Depth ${s.depth}%</div>
    </div>`).join('')}
  </div>
  <div class="disp" style="font-size:16px;color:var(--gold-soft);margin:16px 0 10px;">FINAL LINEUPS</div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:16px;">
    ${members.map(m=>renderPitch(m,l,true)).join('')}
  </div>
  <div class="disp" style="font-size:16px;color:var(--gold-soft);margin:10px 0;">AWARDS</div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));">
    ${awards.map(a=>`<div class="award"><div style="font-size:22px;">${a.icon}</div><div style="font-weight:700;margin-top:4px;">${a.title}</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">${a.text}</div></div>`).join('')}
  </div>`;
}

function viewHost(l){
  return `
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px;">
    <div class="glass" style="padding:20px;">
      <div class="disp" style="font-size:15px;color:var(--gold-soft);margin-bottom:12px;">AUCTION CONTROLS</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">
        ${l.status==='waiting'? `<button class="btn btn-gold" onclick="hostStartAuction()">Start Auction</button>`:''}
        ${l.status==='running'? `<button class="btn" onclick="hostPause()">⏸ Pause</button>`:''}
        ${l.status==='paused'? `<button class="btn btn-green" onclick="hostResume()">▶ Resume</button>`:''}
        ${l.status!=='ended' && !l.awaitingHostPick? `<button class="btn" onclick="hostSkip()">⏭ Skip Player</button>`:''}
        ${l.status==='running' && !l.awaitingReady && !l.awaitingHostPick? `<button class="btn" onclick="this.disabled=true;hostSkipToFive()">⏩ Skip to Final 5s</button>`:''}
        ${l.status==='running' && l.awaitingReady? `<button class="btn btn-gold" onclick="hostForceStartBidding()">⚡ Force Start Bidding</button>`:''}
        ${l.status!=='ended'? `<button class="btn" onclick="hostUndo()">↩ Undo Last Sale</button>`:''}
        ${l.status!=='ended'? `<button class="btn btn-danger" onclick="hostEnd()">⏹ End Auction</button>`:''}
      </div>
      ${l.awaitingHostPick? `<div style="margin-top:16px;padding:14px;border-radius:12px;border:1px solid var(--gold);background:rgba(212,175,55,.08);">
        <label class="small">🎯 CHOOSE THE NEXT PLAYER — <span id="hostPickCountdown" style="color:var(--gold-soft);font-weight:800;">${phaseRemainingSeconds(l)}s</span> LEFT</label>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <input id="hostPickInput" list="allPlayersList" placeholder="Type a player name…"/>
          <button class="btn btn-gold" style="flex-shrink:0;" onclick="hostSubmitPick()">Put Up</button>
          <button class="btn" style="flex-shrink:0;" onclick="hostPickRandomNow()">🎲 Auto-pick Now</button>
        </div>
        <datalist id="allPlayersList">${PLAYERS.map(p=>`<option value="${p.name}">`).join('')}</datalist>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;">If you don't choose in time, a player is auto-picked from the pool.</div>
      </div>`:''}
      ${(l.status==='running' && l.currentPlayerId && !l.awaitingHostPick)? `<div style="margin-top:16px;">
        <label class="small">🎯 ASSIGN A SPECIFIC PLAYER NEXT</label>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <input id="assignPlayerInput" list="allPlayersList" placeholder="Type a player name…"/>
          <button class="btn btn-gold" style="flex-shrink:0;" onclick="hostAssignPlayer()">Put Up</button>
        </div>
        <datalist id="allPlayersList">${PLAYERS.map(p=>`<option value="${p.name}">`).join('')}</datalist>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;">Overrides the auto-pick and restarts the ready-check for that player.</div>
      </div>`:''}
    </div>
    <div class="glass" style="padding:20px;">
      <div class="disp" style="font-size:15px;color:var(--gold-soft);margin-bottom:12px;">MANAGERS</div>
      ${Object.values(l.members).map(m=>`<div class="bidrow"><span>${m.name}${m.id===l.hostId?' 👑':''}</span>
        <span style="display:flex;gap:6px;">
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px;" onclick="hostAdjustBudget('${m.id}',10000000)">+10M</button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px;" onclick="hostAdjustBudget('${m.id}',-10000000)">-10M</button>
          ${m.id!==l.hostId? `<button class="btn btn-danger" style="padding:4px 8px;font-size:12px;" onclick="hostKick('${m.id}')">Kick</button>`:''}
        </span></div>`).join('')}
    </div>
  </div>
  <div class="glass" style="padding:20px;margin-top:16px;">
    <div class="disp" style="font-size:15px;color:var(--gold-soft);margin-bottom:8px;">RULES</div>
    <div style="color:var(--muted);font-size:13px;">Position restrictions: <b style="color:white;">${l.positionRestrictions?'On':'Off'}</b> · Duplicates: <b style="color:white;">${l.allowDuplicates?'Allowed':'Not allowed'}</b> · Timer: <b style="color:white;">${l.timerLen}s</b> · Squad size: <b style="color:white;">${l.squadSize}</b></div>
  </div>`;
}

/* ---------------------------- BOOT ---------------------------- */
tryResumeSession();
</script>
